name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install
        # `npm ci` requires a lockfile (now committed). --ignore-scripts skips
        # backend's prisma postinstall + shared's prepare — we run them below
        # explicitly so failures are visible per step.
        run: npm ci --no-audit --no-fund --ignore-scripts
      - name: Build shared
        run: npm run build --workspace shared
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend
      - name: TypeScript — backend
        run: npx tsc -p tsconfig.json --noEmit
        working-directory: backend
      - name: TypeScript — frontend
        run: npx tsc --noEmit
        working-directory: frontend
      # next build catches things tsc doesn't — bad imports inside server
      # components, missing dynamic params, Next config errors, etc. Caught
      # the lockfile/eslint mismatch a deploy earlier than docker.yml would.
      - name: Next build — frontend
        run: npx next build
        working-directory: frontend
        env:
          # Frontend reads these at build time. The values don't matter for
          # the static analysis pass — production overrides them at runtime.
          NEXT_PUBLIC_API_URL: /api
          NEXT_TELEMETRY_DISABLED: '1'
