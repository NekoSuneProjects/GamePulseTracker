services:
  postgres:
    image: postgres:16-alpine
    container_name: gpt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: gpt-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - yes
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    image: ghcr.io/nekosuneprojects/gamepulsetracker-backend:main
    container_name: gpt-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      # IMPORTANT: the container ALWAYS listens on 4000 internally. BACKEND_PORT
      # in .env is just the HOST port the docker-compose port mapping uses.
      # Without this override, env_file would propagate BACKEND_PORT into the
      # container and Nest would listen on the wrong port, breaking the
      # healthcheck and nginx → backend:4000 routing.
      BACKEND_PORT: 4000
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    healthcheck:
      # start_period gives prisma migrate deploy + NestFactory.create enough
      # time to land before Docker starts counting failed probes. Otherwise
      # a fresh boot can flip "starting" → "unhealthy" and trip nginx 502s.
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_ADSENSE_CLIENT: ${NEXT_PUBLIC_ADSENSE_CLIENT:-}
        NEXT_PUBLIC_ADSENSE_SLOT_SIDEBAR: ${NEXT_PUBLIC_ADSENSE_SLOT_SIDEBAR:-}
        NEXT_PUBLIC_ADSENSE_SLOT_FOOTER: ${NEXT_PUBLIC_ADSENSE_SLOT_FOOTER:-}
        NEXT_PUBLIC_ADBLOCK_NOTICE: ${NEXT_PUBLIC_ADBLOCK_NOTICE:-true}
        NEXT_PUBLIC_OVERWOLF_DOWNLOAD_URL: ${NEXT_PUBLIC_OVERWOLF_DOWNLOAD_URL:-}
    image: ghcr.io/nekosuneprojects/gamepulsetracker-frontend:main
    container_name: gpt-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file: .env
    environment:
      NODE_ENV: production
      # Same fix as the backend: force the container's internal port so any
      # PORT/FRONTEND_PORT in .env can't break the docker-internal :3000
      # that nginx + the port mapping rely on.
      PORT: 3000
      FRONTEND_PORT: 3000
      HOSTNAME: 0.0.0.0
      # Server-only API URL for SSR / RSC fetches. NEXT_PUBLIC_API_URL=/api is
      # great for the browser (relative path → nginx → backend) but breaks
      # Node's fetch during SSR (it can't resolve relative URLs). The frontend
      # container reaches the backend directly inside the compose network,
      # which doesn't go through nginx, so no /api prefix here.
      INTERNAL_API_URL: http://backend:4000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: gpt-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
  redis_data:
