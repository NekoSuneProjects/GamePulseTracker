worker_processes auto;
events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;
  server_tokens off;

  # Allow up to 10 MB request bodies (avatar uploads, ingest payloads).
  client_max_body_size 10m;
  client_body_buffer_size 128k;
  proxy_read_timeout 60s;
  proxy_send_timeout 60s;
  proxy_connect_timeout 30s;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/manifest+json application/x-font-ttf font/opentype
    image/svg+xml image/x-icon;

  # Upgrade map for proper WebSocket handshakes anywhere we proxy.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream backend  { server backend:4000;  keepalive 32; }
  upstream frontend { server frontend:3000; keepalive 32; }

  # Shared backend proxy headers — included from every backend location.
  # (Defined here so we only write them once.)
  # Note: nginx doesn't support YAML-style anchors. We inline these via
  # include directives below, but for simplicity keep them inline per block.

  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Uncomment after issuing TLS certs (see docs/DEPLOYMENT.md):
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Basic security headers (CSP intentionally absent — adjust to your liking).
    add_header X-Content-Type-Options nosniff      always;
    add_header X-Frame-Options        SAMEORIGIN   always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    # ─────────────────────────────────────────────────────────────────────
    # Backend routes — keep ALL of these explicit so the / catch-all below
    # never accidentally swallows a backend endpoint and 404s against the
    # frontend (which is exactly what bit us on /auth/login earlier).
    # ─────────────────────────────────────────────────────────────────────

    # Public REST API. proxy_pass with trailing / strips the /api/ prefix
    # so backend's controllers (mounted at root) handle the path directly:
    #   GET /api/auth/me   →  backend GET /auth/me
    #   GET /api/games     →  backend GET /games
    #   GET /api/api/fortnite/player/X  → backend GET /api/fortnite/player/X
    location /api/ {
      proxy_pass http://backend/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
    }

    # Socket.IO (WebSocket upgrade).
    location /socket.io/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400s;  # keep websockets alive 24h
      proxy_send_timeout 86400s;
    }

    # Backend healthcheck — also hit by the docker-compose healthcheck.
    location = /health {
      proxy_pass http://backend/health;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      access_log off;
    }

    # Swagger UI (backend-served).
    location /docs {
      proxy_pass http://backend/docs;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host              $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /docs/ {
      proxy_pass http://backend/docs/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host              $host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────────────────
    # Frontend (Next.js)
    # ─────────────────────────────────────────────────────────────────────

    # Long-cache Next's hashed static assets (immutable filenames).
    location /_next/static/ {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_cache_valid 200 30d;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Catch-all: everything else (HTML pages, /_next/image, public assets,
    # API routes built into Next, etc.) goes to the frontend.
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
    }
  }
}
